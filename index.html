    <script>
    // Enhanced fullscreen button
    document.addEventListener('DOMContentLoaded', function() {
        var btn = document.getElementById('fullscreen-btn');
        var icon = document.getElementById('fullscreen-icon');
        function isFullScreen() {
            return document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement;
        }
        function setIcon() {
            if (isFullScreen()) {
                icon.classList.remove('fa-expand');
                icon.classList.add('fa-compress');
                btn.title = 'Exit fullscreen';
            } else {
                icon.classList.remove('fa-compress');
                icon.classList.add('fa-expand');
                btn.title = 'Fullscreen';
            }
        }
        if (btn && icon) {
            btn.addEventListener('click', function() {
                if (!isFullScreen()) {
                    var elem = document.documentElement;
                    if (elem.requestFullscreen) {
                        elem.requestFullscreen();
                    } else if (elem.mozRequestFullScreen) {
                        elem.mozRequestFullScreen();
                    } else if (elem.webkitRequestFullscreen) {
                        elem.webkitRequestFullscreen();
                    } else if (elem.msRequestFullscreen) {
                        elem.msRequestFullscreen();
                    }
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    } else if (document.mozCancelFullScreen) {
                        document.mozCancelFullScreen();
                    } else if (document.webkitExitFullscreen) {
                        document.webkitExitFullscreen();
                    } else if (document.msExitFullscreen) {
                        document.msExitFullscreen();
                    }
                }
            });
            document.addEventListener('fullscreenchange', setIcon);
            document.addEventListener('webkitfullscreenchange', setIcon);
            document.addEventListener('mozfullscreenchange', setIcon);
            document.addEventListener('MSFullscreenChange', setIcon);
            setIcon();
        }
    });
    </script>

    <!-- Initialize Music Manager -->
    <script>
    window.musicManager = {
        audio: null,
        isPlaying: false,

        init() {
            this.audio = new Audio("./media/audio.mp3");
            this.audio.loop = true;
            this.audio.volume = 0.7;
            this.audio.preload = "auto";

            this.audio.onplay = () => {
                this.isPlaying = true;
                this.updateUI();
            };

            this.audio.onpause = () => {
                this.isPlaying = false;
                this.updateUI();
            };

            this.updateUI();
        },

        play() {
            if (!this.audio) return Promise.reject('Audio not initialized');
            return this.audio.play().catch(e => {
                console.warn('Error playing music:', e);
                throw e;
            });
        },

        togglePlayback() {
            if (!this.audio) return;
            if (this.audio.paused) {
                this.audio.play().catch(e => {
                    console.warn('Error playing music:', e);
                });
            } else {
                this.audio.pause();
            }
        },

        updateUI() {
            const icon = document.getElementById('audio-icon');
            if (!icon) return;
            if (this.isPlaying) {
                icon.classList.remove('fa-volume-xmark');
                icon.classList.add('fa-volume-high');
            } else {
                icon.classList.remove('fa-volume-high');
                icon.classList.add('fa-volume-xmark');
            }
        }
    };

    document.addEventListener('DOMContentLoaded', () => {
        window.musicManager.init();
        const toggleButton = document.getElementById('toggle-audio');
        if (toggleButton) {
            toggleButton.addEventListener('click', () => {
                window.musicManager.togglePlayback();
            });
        } else {
            console.warn('Toggle-audio button not found');
        }
    });
</script>
